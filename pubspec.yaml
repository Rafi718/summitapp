name: summitapp
description: "Summit App - Aplikasi E-Commerce Peralatan Pendakian"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.5
  provider: ^6.1.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  fl_chart: ^0.69.2
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo/
    - assets/images/products/
    - assets/images/banners/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo/logo_app.png"
  min_sdk_android: 21
